<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do Our List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf6f0; /* Pastel Cream */
        }
        .pastel-blue { background-color: #d1e8ff; }
        .pastel-pink { background-color: #ffdde1; }
        .pastel-green { background-color: #e2f0cb; }
        .pastel-purple { background-color: #e1d5e7; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .btn-pastel {
            transition: all 0.3s ease;
            border-radius: 12px;
        }
        .btn-pastel:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }
        .task-done {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-700">🌸 To-do Our List</h1>
            <p class="text-gray-500 mt-2">Kelola tugas bersama dengan ceria!</p>
            <div id="auth-status" class="mt-4 text-sm text-gray-400">
                Menghubungkan ke server...
            </div>
            <div id="user-info" class="hidden mt-2 p-2 bg-white rounded-lg shadow-sm text-xs inline-block">
                ID Anda: <span id="my-id" class="font-bold text-blue-400"></span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Kolom Kiri: Input & Grafik -->
            <div class="md:col-span-1 space-y-6">
                <div class="card p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-600">Tambah Tugas</h2>
                    <div class="space-y-4">
                        <input type="text" id="taskInput" placeholder="Tulis rencana Anda..." 
                               class="w-full p-3 rounded-xl border border-gray-100 focus:outline-none focus:ring-2 focus:ring-pink-200">
                        
                        <select id="taskDuration" class="w-full p-3 rounded-xl border border-gray-100 bg-white">
                            <option value="Harian">Harian</option>
                            <option value="Mingguan">Mingguan</option>
                            <option value="Bulanan">Bulanan</option>
                        </select>

                        <button onclick="addTask()" class="w-full py-3 pastel-pink text-gray-700 font-bold btn-pastel shadow-sm">
                            Tambah ✨
                        </button>
                    </div>
                </div>

                <div class="card p-6">
                    <h2 class="text-xl font-semibold mb-4 text-gray-600">Statistik</h2>
                    <canvas id="statsChart"></canvas>
                </div>
            </div>

            <!-- Kolom Kanan: Daftar Tugas -->
            <div class="md:col-span-2">
                <div class="card p-6 min-h-[500px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-700">Daftar Rencana</h2>
                        <div class="flex gap-2">
                            <button onclick="filterTasks('Semua')" class="px-3 py-1 text-xs rounded-full bg-gray-100">Semua</button>
                            <button onclick="filterTasks('Harian')" class="px-3 py-1 text-xs rounded-full pastel-blue">Hari</button>
                            <button onclick="filterTasks('Mingguan')" class="px-3 py-1 text-xs rounded-full pastel-green">Minggu</button>
                            <button onclick="filterTasks('Bulanan')" class="px-3 py-1 text-xs rounded-full pastel-purple">Bulan</button>
                        </div>
                    </div>

                    <div id="taskList" class="space-y-4">
                        <div class="text-center py-20 text-gray-300">Memuat data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'todo-our-list';

        let currentTasks = [];
        let filterType = 'Semua';
        let chartInstance = null;
        let unsubscribeTasks = null;

        // 1. Logika Autentikasi (WAJIB sebelum akses Firestore)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                document.getElementById('auth-status').innerText = "Gagal terhubung: " + error.message;
            }
        };

        // Memantau perubahan status auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-status').innerText = "🟢 Online (Real-time)";
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('my-id').innerText = user.uid;
                
                // Mulai langganan data setelah user terverifikasi
                startListeningToTasks();
            } else {
                if (unsubscribeTasks) unsubscribeTasks();
                document.getElementById('auth-status').innerText = "🔴 Offline";
            }
        });

        // 2. Langganan Data Tugas
        function startListeningToTasks() {
            if (!auth.currentUser) return;

            const q = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
            
            // Unsubscribe jika sebelumnya sudah ada listener aktif
            if (unsubscribeTasks) unsubscribeTasks();

            unsubscribeTasks = onSnapshot(q, (snapshot) => {
                currentTasks = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderTasks();
                updateChart();
            }, (error) => {
                console.error("Snapshot error:", error);
                // Menampilkan error di UI jika permission ditolak
                if (error.code === 'permission-denied') {
                    document.getElementById('taskList').innerHTML = 
                        `<div class="text-center py-20 text-red-400">Error: Akses ditolak. Pastikan Anda sudah masuk.</div>`;
                }
            });
        }

        // 3. Logika Render UI
        window.renderTasks = () => {
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            const filtered = filterType === 'Semua' 
                ? currentTasks 
                : currentTasks.filter(t => t.duration === filterType);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-300">Tidak ada tugas kategori ${filterType}.</div>`;
                return;
            }

            // Urutkan berdasarkan waktu (terbaru di atas)
            filtered.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            filtered.forEach(task => {
                const div = document.createElement('div');
                div.className = `p-4 flex items-center justify-between card border-l-8 ${getDurationColor(task.duration)}`;
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask('${task.id}', ${task.completed})"
                               class="w-5 h-5 accent-pink-400 cursor-pointer">
                        <div>
                            <p class="font-semibold text-gray-700 ${task.completed ? 'task-done' : ''}">${task.title}</p>
                            <span class="text-[10px] uppercase tracking-wider text-gray-400">${task.duration}</span>
                        </div>
                    </div>
                    <button onclick="deleteTask('${task.id}')" class="text-gray-300 hover:text-red-400 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                container.appendChild(div);
            });
        };

        function getDurationColor(dur) {
            if (dur === 'Harian') return 'border-blue-200';
            if (dur === 'Mingguan') return 'border-green-200';
            return 'border-purple-200';
        }

        // 4. Aksi (Tambah, Toggle, Hapus)
        window.addTask = async () => {
            if (!auth.currentUser) return;
            const title = document.getElementById('taskInput').value;
            const duration = document.getElementById('taskDuration').value;
            
            if (!title.trim()) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tasks'), {
                    title,
                    duration,
                    completed: false,
                    createdAt: serverTimestamp(),
                    createdBy: auth.currentUser.uid
                });
                document.getElementById('taskInput').value = '';
            } catch (e) {
                console.error("Gagal menambah tugas:", e);
            }
        };

        window.toggleTask = async (id, currentStatus) => {
            if (!auth.currentUser) return;
            const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await updateDoc(taskRef, { completed: !currentStatus });
        };

        window.deleteTask = async (id) => {
            if (!auth.currentUser) return;
            const taskRef = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await deleteDoc(taskRef);
        };

        window.filterTasks = (type) => {
            filterType = type;
            renderTasks();
        };

        // 5. Logika Grafik
        function updateChart() {
            const ctx = document.getElementById('statsChart').getContext('2d');
            
            const done = currentTasks.filter(t => t.completed).length;
            const pending = currentTasks.length - done;

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Selesai', 'Belum'],
                    datasets: [{
                        data: [done, pending],
                        backgroundColor: ['#e2f0cb', '#ffdde1'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    cutout: '70%'
                }
            });
        }

        // Jalankan autentikasi saat jendela dimuat
        window.onload = initAuth;

    </script>
</body>
</html>
